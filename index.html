<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    
    <title>Frontend Mentor | Product preview card component</title>

    <!-- Google Fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- CSS File  -->
    <link rel="stylesheet" href="styles.css">
    
  </head>
  <body>
    <main>

      <section id="shop-section">
        <div id="photo">
          <img
            src="images/image-product-desktop.jpg"
            alt="A picture of a perfume bottle"
          >
        </div>
        <div id="description">
          <p id="category">P E R F U M E</p>
          <h2>Gabrielle Essence Eau De Parfum</h2>

          <p id="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
          Perfumer-Creator for the House of CHANEL.</p>
          
          <div class="price">
            <p id="new-price">$149.99</p>
            <p id="old-price"><s>$169.99</s></p>
          </div>

          <div class="checkout">
            <img
              src="images/icon-cart.svg"
              alt="Shopping cart image"
            >
            <p>Add to Cart</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
